<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatSphere Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0f1115;
      --bg-panel: #161920;
      --bg-hover: #1e222b;
      --border: #2a2e39;
      --accent: #10b981;
      --accent-hover: #059669;
      --danger: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --radius-lg: 24px;
      --radius-md: 16px;
      --shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg-deep); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; }
    button { cursor: pointer; border: none; background: none; color: inherit; transition: 0.2s; }
    input, textarea { outline: none; font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* AUTH SCREEN */
    #auth-screen { position: fixed; inset: 0; background: var(--bg-deep); display: flex; justify-content: center; align-items: center; z-index: 100; }
    .auth-card { background: var(--bg-panel); padding: 40px; border-radius: var(--radius-lg); width: 400px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .auth-card h1 { margin-bottom: 30px; font-weight: 600; letter-spacing: -0.5px; }
    .auth-card h1 span { color: var(--accent); }
    .input-field { width: 100%; padding: 14px 18px; border-radius: 12px; background: var(--bg-deep); border: 1px solid var(--border); color: white; margin-bottom: 16px; font-size: 15px; transition: 0.2s; }
    .input-field:focus { border-color: var(--accent); }
    .btn-primary { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent); color: white; font-weight: 600; font-size: 15px; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
    .btn-danger:hover { background: var(--danger); color: white; }
    .btn-outline { border: 1px solid var(--border); background: var(--bg-hover); color: white; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; }
    .btn-outline:hover { border-color: var(--text-muted); }

    /* MAIN LAYOUT */
    #app { display: none; width: 100%; height: 100%; }

    /* SIDEBAR */
    .sidebar { width: 380px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10;}
    
    .profile-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .profile-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--border); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; color: var(--text-muted);}
    
    .tabs { display: flex; padding: 15px 20px 0; gap: 20px; border-bottom: 1px solid var(--border); }
    .tab { padding-bottom: 12px; color: var(--text-muted); font-weight: 500; cursor: pointer; position: relative; }
    .tab.active { color: var(--accent); }
    .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent); border-radius: 2px 2px 0 0; }

    .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
    .chat-item { padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; margin-bottom: 2px; }
    .chat-item:hover { background: var(--bg-hover); }
    .chat-item.active { background: var(--bg-hover); }
    .chat-meta { flex: 1; min-width: 0; }
    .chat-name { font-weight: 500; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .fab { position: absolute; bottom: 24px; left: 300px; width: 54px; height: 54px; border-radius: 50%; background: var(--accent); color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); z-index: 20; }
    .fab:hover { transform: scale(1.05); }

    /* MAIN STAGE */
    .main-stage { flex: 1; display: flex; flex-direction: column; background: var(--bg-deep); position: relative; }
    .chat-header { padding: 20px 30px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
    .messages-view { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    
    /* MESSAGES WORKOUT */
    .msg-wrap { display: flex; flex-direction: column; max-width: 65%; position: relative; group: hover; }
    .msg-wrap.me { align-self: flex-end; align-items: flex-end; }
    .msg-bubble-container { display: flex; align-items: center; gap: 8px; width: 100%; }
    .msg-wrap.me .msg-bubble-container { flex-direction: row-reverse; }

    .msg-bubble { background: var(--bg-panel); padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; border-bottom-left-radius: 4px; border: 1px solid var(--border); word-wrap: break-word; position: relative; }
    .msg-wrap.me .msg-bubble { background: var(--accent); color: white; border-color: transparent; border-bottom-left-radius: 18px; border-bottom-right-radius: 4px; }
    .msg-sender { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .msg-wrap.me .msg-sender { flex-direction: row-reverse; }
    
    /* Delete button styling */
    .btn-delete-msg { opacity: 0; color: var(--text-muted); font-size: 14px; padding: 4px; transition: 0.2s; }
    .msg-wrap:hover .btn-delete-msg { opacity: 1; }
    .btn-delete-msg:hover { color: var(--danger); transform: scale(1.1); }

    .chat-img { max-width: 300px; border-radius: 12px; margin-top: 4px; display: block; cursor: pointer; border: 1px solid var(--border); }
    .chat-file { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 10px; text-decoration: none; color: inherit; font-size: 14px; font-weight: 500; }
    .chat-file:hover { background: rgba(0,0,0,0.4); }
    
    .vo-btn { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.2); }
    .vo-destroyed { color: var(--text-muted) !important; font-style: italic; border-color: transparent !important; background: transparent !important; }

    .composer { padding: 20px 30px; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
    .composer input[type="text"] { flex: 1; background: var(--bg-deep); border: 1px solid var(--border); padding: 14px 20px; border-radius: 24px; color: white; font-size: 15px; }
    .vo-toggle { padding: 10px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); border: 1px solid var(--border); }
    .vo-toggle.active { background: #ef4444; color: white; border-color: transparent; }
    .btn-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; background: var(--bg-hover); transition: 0.2s; }
    .btn-icon:hover { background: var(--border); }
    .btn-send { background: var(--accent); color: white; }
    .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }

    /* MODALS & OVERLAYS */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 50; }
    .modal { background: var(--bg-panel); width: 420px; border-radius: var(--radius-lg); padding: 30px; border: 1px solid var(--border); box-shadow: var(--shadow); max-height: 90vh; overflow-y: auto;}
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 18px; font-weight: 600; }
    .user-select-list { max-height: 300px; overflow-y: auto; margin: 15px 0; border: 1px solid var(--border); border-radius: 12px; }
    .user-row { padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .user-row:hover { background: var(--bg-hover); }
    .user-row.selected { background: rgba(16, 185, 129, 0.1); }

    /* TOAST NOTIFICATIONS */
    #toast-container { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
    .toast { background: var(--bg-panel); border-left: 4px solid var(--accent); padding: 15px 20px; border-radius: 8px; box-shadow: var(--shadow); animation: slideIn 0.3s ease; min-width: 250px; cursor: pointer;}
    .toast h4 { font-size: 14px; margin-bottom: 4px; }
    .toast p { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px;}
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

  <div id="auth-screen">
    <div class="auth-card">
      <h1>Chat<span>Sphere</span></h1>
      <div id="login-view">
        <input class="input-field" id="log-user" placeholder="Username" />
        <input class="input-field" id="log-pass" type="password" placeholder="Password" />
        <button class="btn-primary" onclick="auth('login')">Sign In</button>
        <p style="margin-top:20px; text-align:center; font-size:13px; color:var(--text-muted); cursor:pointer;" onclick="document.getElementById('login-view').style.display='none'; document.getElementById('reg-view').style.display='block';">Don't have an account? Sign up</p>
      </div>
      <div id="reg-view" style="display:none;">
        <input class="input-field" id="reg-user" placeholder="Username" />
        <input class="input-field" id="reg-name" placeholder="Display Name" />
        <input class="input-field" id="reg-pass" type="password" placeholder="Password" />
        <button class="btn-primary" onclick="auth('register')">Create Account</button>
        <p style="margin-top:20px; text-align:center; font-size:13px; color:var(--text-muted); cursor:pointer;" onclick="document.getElementById('reg-view').style.display='none'; document.getElementById('login-view').style.display='block';">Already have an account? Sign in</p>
      </div>
    </div>
  </div>

  <div id="app">
    <div class="sidebar">
      <div class="profile-header">
        <div class="profile-info" onclick="openSettings()">
          <div class="avatar" id="my-avatar"></div>
          <div>
            <span style="font-weight:600" id="my-name">User</span>
            <div style="font-size:12px; color:var(--text-muted)">Settings ⚙️</div>
          </div>
        </div>
      </div>
      
      <div class="tabs">
        <div class="tab active" id="tab-dm" onclick="setTab('dm')">Direct Messages</div>
        <div class="tab" id="tab-group" onclick="setTab('group')">Groups</div>
      </div>

      <div class="chat-list" id="rooms-list"></div>
      <button class="fab" onclick="openNewChatModal()">+</button>
    </div>

    <div class="main-stage">
      <div id="toast-container"></div>

      <div class="chat-header" style="display:none" id="chat-header">
        <div class="avatar" id="room-avatar"></div>
        <h2 style="font-size: 16px; font-weight:600;" id="room-title">Select a chat</h2>
      </div>
      
      <div class="messages-view" id="msg-container">
        <div style="margin:auto; color:var(--text-muted); text-align:center;">
          <h2 style="margin-bottom:10px; color:white;">Welcome to ChatSphere</h2>
          <p>Select a chat or start a new one to begin messaging.</p>
        </div>
      </div>

      <div class="composer" style="display:none" id="composer">
        <button class="vo-toggle" id="vo-toggle" onclick="this.classList.toggle('active')">👁️</button>
        <button class="btn-icon" onclick="document.getElementById('media-upload').click()">📎</button>
        <input type="file" id="media-upload" style="display:none" onchange="uploadMedia(this)">
        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" onkeydown="if(event.key==='Enter') sendMsg()" />
        <button class="btn-icon btn-send" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-new">
    <div class="modal">
      <div class="modal-header">
        <span id="new-modal-title">New Chat</span>
        <button onclick="document.getElementById('modal-new').style.display='none'">✕</button>
      </div>
      <input class="input-field" id="group-name-input" placeholder="Group Name" style="display:none; margin-bottom:0;" />
      <div class="user-select-list" id="users-list"></div>
      <button class="btn-primary" id="btn-create-chat" onclick="createChat()">Start Chat</button>
    </div>
  </div>

  <div class="modal-overlay" id="modal-settings">
    <div class="modal">
      <div class="modal-header"><span>Profile Settings</span><button onclick="document.getElementById('modal-settings').style.display='none'">✕</button></div>
      
      <div style="text-align:center; margin-bottom: 25px;">
        <div class="avatar" id="settings-avatar" style="width:100px; height:100px; margin: 0 auto 15px; font-size:35px; border:2px solid var(--border);"></div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <button class="btn-outline" onclick="document.getElementById('avatar-upload').click()">📷 Upload</button>
          <button class="btn-outline" onclick="generateRandomAvatar()">🎲 Make Avatar</button>
        </div>
        <input type="file" id="avatar-upload" style="display:none" accept="image/*" onchange="uploadAvatar(this)">
      </div>

      <label style="font-size:12px; color:var(--text-muted); margin-bottom:6px; display:block;">Display Name</label>
      <input class="input-field" id="settings-name" />

      <label style="font-size:12px; color:var(--text-muted); margin-bottom:6px; display:block;">About Me (Bio)</label>
      <textarea class="input-field" id="settings-bio" rows="3" style="resize:none;"></textarea>

      <button class="btn-primary" onclick="saveProfile()" style="margin-bottom:15px;">Save Profile</button>
      
      <div style="border-top: 1px solid var(--border); padding-top:20px; display:flex; flex-direction:column; gap:10px;">
        <button class="btn-primary" style="background:var(--bg-hover); color:white; border:1px solid var(--border);" onclick="logout()">Sign Out</button>
        <button class="btn-primary btn-danger" onclick="deleteAccount()">Delete Account</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-view-once">
    <div class="modal" style="text-align:center; max-width: 500px; background: #0b0d12;">
      <div class="modal-header">
        <span>🔒 Secure View-Once Media</span>
      </div>
      <div id="vo-modal-content" style="margin: 25px 0; min-height: 150px; display:flex; align-items:center; justify-content:center; color: var(--text-muted);">
        </div>
      <button class="btn-primary" style="background: var(--danger);" onclick="closeAndViewOnce()">Close & Permanently Destroy</button>
    </div>
  </div>

<script>
const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

const HOST = isLocal ? 'localhost:8000' : window.location.host;
const PROTOCOL = window.location.protocol;
const WS_PROTOCOL = PROTOCOL === 'https:' ? 'wss:' : 'ws:';

const API = isLocal ? `http://${HOST}` : `${PROTOCOL}//${HOST}`;
const WS_BASE = isLocal ? `ws://${HOST}` : `${WS_PROTOCOL}//${HOST}`;

let user = null;
let currentRoom = null;
let currentTab = 'dm';
let ws = null;
let allUsers = [];
let selectedUsersForGroup = new Set();

// Active View-Once references
let activeVoMsgId = null;
let activeVoRoomId = null;

window.addEventListener('DOMContentLoaded', () => {
  const savedUser = sessionStorage.getItem('chatsphere_user');
  if (savedUser) {
    try {
      user = JSON.parse(savedUser);
      initApp();
    } catch (e) {
      sessionStorage.removeItem('chatsphere_user');
    }
  }
});

document.getElementById('log-pass').addEventListener('keydown', e => e.key === 'Enter' && auth('login'));
document.getElementById('reg-pass').addEventListener('keydown', e => e.key === 'Enter' && auth('register'));

async function auth(type) {
  const u = document.getElementById(type === 'login' ? 'log-user' : 'reg-user').value;
  const p = document.getElementById(type === 'login' ? 'log-pass' : 'reg-pass').value;
  const body = { username: u, password: p };
  if(type === 'register') body.display_name = document.getElementById('reg-name').value;

  try {
    const res = await fetch(`${API}/api/auth/${type}`, { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (!res.ok) return alert('Authentication Failed');
    const data = await res.json();
    user = data.user;
    
    sessionStorage.setItem('chatsphere_user', JSON.stringify(user));
    initApp();
  } catch(e) { alert('Server error'); }
}

function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('my-name').innerText = user.display_name;
  updateAvatarDisplay(user.avatar_url);
  
  loadRooms();
  connectGlobalWS();
}

function openSettings() {
  document.getElementById('modal-settings').style.display = 'flex';
  document.getElementById('settings-name').value = user.display_name;
  document.getElementById('settings-bio').value = user.bio || '';
  updateAvatarDisplay(user.avatar_url);
}

function updateAvatarDisplay(url) {
  const isDiceBear = url && url.startsWith('http');
  const bg = url ? `url(${isDiceBear ? url : API+url})` : '';
  const txt = url ? '' : user.display_name[0].toUpperCase();
  ['my-avatar', 'settings-avatar'].forEach(id => {
    document.getElementById(id).style.backgroundImage = bg;
    document.getElementById(id).innerText = txt;
  });
}

async function uploadAvatar(input) {
  if(!input.files[0]) return;
  const fd = new FormData();
  fd.append('file', input.files[0]);
  fd.append('user_id', user.id);
  
  const res = await fetch(`${API}/api/profile/avatar`, { method: 'POST', body: fd });
  const data = await res.json();
  user.avatar_url = data.avatar_url;
  sessionStorage.setItem('chatsphere_user', JSON.stringify(user));
  updateAvatarDisplay(data.avatar_url);
}

function generateRandomAvatar() {
  const seed = Math.random().toString(36).substring(7);
  const style = ['adventurer', 'fun-emoji', 'bottts', 'lorelei'][Math.floor(Math.random() * 4)];
  user.avatar_url = `https://api.dicebear.com/7.x/${style}/svg?seed=${seed}`;
  sessionStorage.setItem('chatsphere_user', JSON.stringify(user));
  updateAvatarDisplay(user.avatar_url);
}

async function saveProfile() {
  const newName = document.getElementById('settings-name').value;
  const newBio = document.getElementById('settings-bio').value;
  
  await fetch(`${API}/api/users/${user.id}`, {
    method: 'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ display_name: newName, bio: newBio, avatar_url: user.avatar_url })
  });
  
  user.display_name = newName;
  user.bio = newBio;
  sessionStorage.setItem('chatsphere_user', JSON.stringify(user));
  
  document.getElementById('my-name').innerText = user.display_name;
  document.getElementById('modal-settings').style.display = 'none';
  showToast('Profile Saved', 'Your settings have been updated.');
}

async function deleteAccount() {
  if(confirm("Are you sure you want to permanently delete your account? This cannot be undone.")) {
    await fetch(`${API}/api/users/${user.id}`, { method: 'DELETE' });
    logout();
  }
}

function logout() {
  user = null;
  if(ws) ws.close();
  sessionStorage.removeItem('chatsphere_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('modal-settings').style.display = 'none';
}

function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-dm').classList.toggle('active', tab === 'dm');
  document.getElementById('tab-group').classList.toggle('active', tab === 'group');
  loadRooms();
}

// ─── GLOBAL WEBSOCKET ─────────────────────────
function connectGlobalWS() {
  if(ws) ws.close();
  ws = new WebSocket(`${WS_BASE}/ws/${user.id}`);
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    
    if(data.type === 'new_message') {
      const msg = data.message;
      if(currentRoom === msg.room_id) {
        renderMsg(msg);
      } else {
        const preview = msg.message_type === 'text' ? msg.content : `📁 Sent an attachment`;
        showToast(msg.room_name, `${msg.sender_name}: ${msg.is_view_once ? '🔒 View Once' : preview}`, msg.room_id, msg.room_name);
      }
    }
    
    if(data.type === 'message_destroyed' && currentRoom === data.room_id) {
      const box = document.getElementById(`msg-${data.msg_id}`);
      if(box) {
        const innerBubble = box.querySelector('.msg-bubble');
        if(innerBubble) innerBubble.className = "msg-bubble vo-destroyed";
        innerBubble.innerHTML = `🔒 Message Opened & Destroyed`;
      }
    }

    if(data.type === 'message_deleted' && currentRoom === data.room_id) {
      const box = document.getElementById(`msg-${data.msg_id}`);
      if(box) {
        const innerBubble = box.querySelector('.msg-bubble');
        if(innerBubble) {
          innerBubble.innerHTML = `🚫 This message was deleted`;
          innerBubble.style.fontStyle = "italic";
          innerBubble.style.color = "var(--text-muted)";
        }
        const delBtn = box.querySelector('.btn-delete-msg');
        if(delBtn) delBtn.remove();
      }
    }
  };
}

function showToast(title, body, roomId, roomName) {
  const cont = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<h4>${title}</h4><p>${body}</p>`;
  if(roomId) t.onclick = () => { switchRoom(roomId, roomName, false); t.remove(); };
  cont.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ─── ROOMS & MESSAGES ─────────────────────────
async function loadRooms() {
  const res = await fetch(`${API}/api/rooms/${user.id}`);
  const rooms = await res.json();
  const list = document.getElementById('rooms-list');
  list.innerHTML = '';
  
  const filteredRooms = rooms.filter(r => currentTab === 'dm' ? r.is_dm : !r.is_dm);
  
  filteredRooms.forEach(r => {
    list.innerHTML += `
      <div class="chat-item ${currentRoom === r.id ? 'active' : ''}" onclick="switchRoom('${r.id}', '${r.name}', ${r.is_dm})">
        <div class="avatar">${r.name[0].toUpperCase()}</div>
        <div class="chat-meta"><div class="chat-name">${r.name}</div></div>
      </div>
    `;
  });
}

async function switchRoom(id, name, isDm) {
  try {
    currentRoom = id;
    document.getElementById('chat-header').style.display = 'flex';
    document.getElementById('composer').style.display = 'flex';
    document.getElementById('room-title').innerText = name || 'Chat';
    document.getElementById('room-avatar').innerText = name ? name[0].toUpperCase() : '#';
    await loadRooms(); 
    
    const msgContainer = document.getElementById('msg-container');
    msgContainer.innerHTML = '<div style="margin:auto; color:var(--text-muted);">Loading messages...</div>';
    
    const res = await fetch(`${API}/api/messages/${id}`);
    const msgs = await res.json();
    msgContainer.innerHTML = ''; 
    
    if (msgs.length === 0) {
      msgContainer.innerHTML = `
        <div style="margin:auto; color:var(--text-muted); text-align:center;">
          <div style="font-size: 40px; margin-bottom:10px;">👋</div>
          <h3 style="color: white; margin-bottom: 5px;">It's quiet here...</h3>
          <p>Send a message or a file to start.</p>
        </div>
      `;
    } else {
      msgs.forEach(renderMsg);
    }
  } catch (err) {}
}

function getAvatarUrl(url) {
  if(!url) return '';
  return url.startsWith('http') ? url : API + url;
}

function renderMsg(msg) {
  const box = document.createElement('div');
  box.className = `msg-wrap ${msg.sender_id === user.id ? 'me' : ''}`;
  box.id = `msg-${msg.id}`;
  
  const emptyState = document.querySelector('#msg-container > div[style*="text-align:center"]');
  if (emptyState) emptyState.remove();
  
  let content = '';
  const isDeleted = msg.content === '🚫 This message was deleted';

  if (isDeleted) {
    content = `<div class="msg-bubble" style="font-style: italic; color: var(--text-muted);">${msg.content}</div>`;
  } else if (msg.is_view_once) {
    const stringifiedMsg = JSON.stringify(msg).replace(/"/g, '&quot;');
    content = `<div class="msg-bubble"><button class="vo-btn" onclick="openViewOncePopup('${stringifiedMsg}')">🔒 View Once Content</button></div>`;
  } else if (msg.message_type === 'image') {
    content = `<div class="msg-bubble" style="background:transparent; border:none; padding:0;"><img src="${API}${msg.file_url}" class="chat-img" onclick="window.open(this.src)"></div>`;
  } else if (msg.message_type === 'file') {
    content = `<div class="msg-bubble"><a href="${API}${msg.file_url}" target="_blank" class="chat-file">📁 ${msg.file_name}</a></div>`;
  } else {
    content = `<div class="msg-bubble">${msg.content}</div>`;
  }
  
  // Render WhatsApp style deletion injection triggers
  let deleteButtonHtml = '';
  if (msg.sender_id === user.id && !isDeleted) {
    deleteButtonHtml = `<button class="btn-delete-msg" title="Delete Message" onclick="deleteMessage('${msg.id}')">🗑️</button>`;
  }

  const senderImg = getAvatarUrl(msg.sender_avatar);
  box.innerHTML = `
    <div class="msg-sender">
      <div class="avatar" style="width:20px; height:20px; font-size:10px; background-image:url(${senderImg})">${senderImg ? '' : msg.sender_name[0].toUpperCase()}</div>
      ${msg.sender_name}
    </div>
    <div class="msg-bubble-container">
      ${content}
      ${deleteButtonHtml}
    </div>
  `;
  document.getElementById('msg-container').appendChild(box);
  box.scrollIntoView();
}

function sendMsg() {
  const input = document.getElementById('msg-input');
  const voToggle = document.getElementById('vo-toggle');
  if(!input.value.trim() || !currentRoom) return;
  
  ws.send(JSON.stringify({ 
    type: 'message', room_id: currentRoom,
    content: input.value, is_view_once: voToggle.classList.contains('active') 
  }));
  
  input.value = '';
  voToggle.classList.remove('active');
}

async function uploadMedia(input) {
  const file = input.files[0];
  if(!file || !currentRoom) return;
  
  const voToggle = document.getElementById('vo-toggle');
  const isViewOnce = voToggle.classList.contains('active');
  input.value = '';
  
  const fd = new FormData();
  fd.append('file', file);
  fd.append('room_id', currentRoom);
  fd.append('user_id', user.id);
  fd.append('is_view_once', isViewOnce);
  
  showToast('Uploading...', file.name);
  try {
    await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
    voToggle.classList.remove('active');
  } catch(e) {
    showToast('Upload Failed', 'File might be too large.', null);
  }
}

// ─── PREMIUM MODAL VIEW ONCE FLOW ────────────────
function openViewOncePopup(msgString) {
  const msg = JSON.parse(msgString);
  activeVoMsgId = msg.id;
  activeVoRoomId = msg.room_id;
  
  const viewport = document.getElementById('vo-modal-content');
  viewport.innerHTML = '';
  
  if (msg.message_type === 'image') {
    viewport.innerHTML = `<img src="${API}${msg.file_url}" style="max-width:100%; max-height:450px; border-radius:12px; border:1px solid var(--border);" />`;
  } else if (msg.message_type === 'file') {
    viewport.innerHTML = `<div style="text-align:center;"><div style="font-size:50px;">📁</div><p style="margin-top:10px; color:white; font-weight:500;">${msg.file_name}</p></div>`;
  } else {
    viewport.innerHTML = `<p style="font-size:18px; color:white; line-height:1.6; word-wrap:break-word; max-width:100%;">${msg.content}</p>`;
  }
  
  document.getElementById('modal-view-once').style.display = 'flex';
}

function closeAndViewOnce() {
  if (!activeVoMsgId || !activeVoRoomId) return;
  
  // Fire wipe signal to the SQLite database & connected sockets
  ws.send(JSON.stringify({ type: 'viewed_once', msg_id: activeVoMsgId, room_id: activeVoRoomId }));
  
  // Wipe localized memory immediately
  document.getElementById('vo-modal-content').innerHTML = '';
  document.getElementById('modal-view-once').style.display = 'none';
  
  activeVoMsgId = null;
  activeVoRoomId = null;
}

// ─── REAL-TIME WHATSAPP DELETION ──────────────────
function deleteMessage(msgId) {
  if (confirm("Delete this message for everyone?")) {
    ws.send(JSON.stringify({
      type: 'delete_message',
      msg_id: msgId,
      room_id: currentRoom
    }));
  }
}

// ─── NEW CHAT/GROUP CREATION ─────────────────────────
async function openNewChatModal() {
  document.getElementById('modal-new').style.display = 'flex';
  document.getElementById('new-modal-title').innerText = currentTab === 'dm' ? 'New Direct Message' : 'Create New Group';
  document.getElementById('group-name-input').style.display = currentTab === 'dm' ? 'none' : 'block';
  document.getElementById('btn-create-chat').innerText = currentTab === 'dm' ? 'Start Chat' : 'Create Group';
  
  selectedUsersForGroup.clear();
  
  const res = await fetch(`${API}/api/users`);
  allUsers = await res.json();
  renderUserSelect();
}

function renderUserSelect() {
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  allUsers.forEach(u => {
    if(u.id === user.id) return;
    
    const div = document.createElement('div');
    div.className = `user-row ${selectedUsersForGroup.has(u.id) ? 'selected' : ''}`;
    
    const uImg = getAvatarUrl(u.avatar_url);
    div.innerHTML = `<div class="avatar" style="background-image:url(${uImg})">${uImg ? '' : u.display_name[0].toUpperCase()}</div> 
                     <div><div style="font-weight:500">${u.display_name}</div><div style="font-size:11px; color:var(--text-muted)">${u.bio || 'Available'}</div></div>`;
    
    div.onclick = () => {
      if(currentTab === 'dm') {
        selectedUsersForGroup.clear();
        selectedUsersForGroup.add(u.id);
      } else {
        if(selectedUsersForGroup.has(u.id)) selectedUsersForGroup.delete(u.id);
        else selectedUsersForGroup.add(u.id);
      }
      renderUserSelect();
    };
    list.appendChild(div);
  });
}

async function createChat() {
  try {
    if (selectedUsersForGroup.size === 0) return alert('Please select someone from the list.');
    
    const btn = document.getElementById('btn-create-chat');
    btn.innerText = "Starting...";
    btn.disabled = true;
    
    if (currentTab === 'dm') {
      const targetId = Array.from(selectedUsersForGroup)[0];
      const targetUser = allUsers.find(u => u.id === targetId);

      const res = await fetch(`${API}/api/rooms/dm/${user.id}`, {
        method: 'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ target_user_id: targetId })
      });
      const room = await res.json();
      
      document.getElementById('modal-new').style.display = 'none';
      switchRoom(room.id, targetUser.display_name, true);
    } else {
      const name = document.getElementById('group-name-input').value;
      if(!name) {
        btn.innerText = "Create Group";
        btn.disabled = false;
        return alert('Please enter a name for your group.');
      }
      
      const res = await fetch(`${API}/api/rooms/group/${user.id}`, {
        method: 'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name: name, member_ids: Array.from(selectedUsersForGroup) })
      });
      const room = await res.json();
      
      document.getElementById('modal-new').style.display = 'none';
      switchRoom(room.id, name, false);
    }
    
    btn.innerText = currentTab === 'dm' ? 'Start Chat' : 'Create Group';
    btn.disabled = false;
    document.getElementById('group-name-input').value = '';

  } catch(e) {}
}
</script>
